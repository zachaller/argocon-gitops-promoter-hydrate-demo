apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: change-management-close
  namespace: default
spec:
  promotionStrategyRef:
    name: argocon-demo
  key: change-management-close
  reportOn: active
  descriptionTemplate: >-
    {{- /* presentation only — fields come from trigger.response.output.expression / when.variables */ -}}
    {{- $cid := "" -}}{{- $step := "" -}}{{- $sc := 0 -}}
    {{- if .ResponseOutput -}}
      {{- $cid  = index .ResponseOutput "changeId"   | default "" -}}
      {{- $step = index .ResponseOutput "step"       | default "" -}}
      {{- /* statusCode comes from JSON as float64; coerce to int for clean display + safe comparisons */ -}}
      {{- $sc   = index .ResponseOutput "statusCode" | default 0 | int -}}
    {{- end -}}
    {{- /* The close POST's response.output evaluator does not have access to ResponseOutput, so the */ -}}
    {{- /* persisted changeId on the close response is empty. Fall back to TriggerVariables (correct */ -}}
    {{- /* during the close-POST reconcile) and TriggerOutput.lastClosedChangeId (persisted across */ -}}
    {{- /* subsequent idle reconciles by trigger.when.output). */ -}}
    {{- if eq $cid "" -}}
      {{- if .TriggerVariables -}}{{- $cid = index .TriggerVariables "priorChangeId" | default "" -}}{{- end -}}
      {{- if and (eq $cid "") .TriggerOutput -}}{{- $cid = index .TriggerOutput "lastClosedChangeId" | default "" -}}{{- end -}}
    {{- end -}}
    {{- $sha := "" -}}
    {{- if .TriggerVariables -}}{{- $sha = index .TriggerVariables "canonicalNoteDrySha" | default "" -}}{{- end -}}
    {{- $shaShort := "" -}}{{- if ne $sha "" -}}{{- $shaShort = substr 0 7 $sha -}}{{- end -}}
    {{ .Phase }}:
    {{- if eq $step "closed" }} closed change {{ $cid }} (HTTP {{ $sc }})
    {{- else if eq $step "closeFailedTerminal" }} close gave up for {{ $cid }} (HTTP {{ $sc }}) — treating as done
    {{- else if eq $step "closeRetry" }} close failed for {{ $cid }} (HTTP {{ $sc }}), will retry
    {{- else if eq $step "found" }} found change {{ $cid }} — closing on next reconcile
    {{- else if eq $step "searching" }} no change record in window{{ if ne $shaShort "" }} for note dry SHA {{ $shaShort }}{{ end }} — nothing to close
    {{- else }} searching for change record to close{{ if ne $shaShort "" }} matching note dry SHA {{ $shaShort }}{{ end }}
    {{- end }}
  httpRequest:
    # mode.trigger.when.variables exposes a single decision flag, .TriggerVariables.inCloseMode,
    # plus the dynamic values it already had to compute (.priorChangeId for close,
    # .canonicalNoteDrySha for search). Method selection and URL/body shape live here.
    methodTemplate: >-
      {{- if index .TriggerVariables "inCloseMode" -}}POST{{- else -}}GET{{- end -}}
    timeout: 30s
    headerTemplates:
      Accept: application/json
      Content-Type: application/json
    urlTemplate: >-
      {{- $base := "http://localhost:8987/v1/change-management-service" -}}
      {{- $assetId := index .NamespaceMetadata.Labels "argocd.intuit.com/asset-id" -}}
      {{- if index .TriggerVariables "inCloseMode" -}}
      {{ $base }}/change/close/{{ index .TriggerVariables "priorChangeId" }}
      {{- else -}}
      {{ $base }}/changes/search?asset_id={{ $assetId }}&commit_id={{ index .TriggerVariables "canonicalNoteDrySha" }}&limit=25
      {{- end -}}
    bodyTemplate: |
      {{- if index .TriggerVariables "inCloseMode" -}}
      {
        "change_execution_status": "SUCCEEDED"
      }
      {{- end -}}
  success:
    when:
      expression: |
        // Never failure. success when:
        //   - this reconcile's search GET returned an empty (no in-window record) result, OR
        //   - this reconcile's close POST returned 2xx, OR
        //   - this reconcile's close POST returned a non-retryable (non-429 4xx) error, OR
        //   - no HTTP this reconcile AND we're not mid-close (prior step is not "found"/"closeRetry").
        // pending only while we have a found change record waiting on (or retrying) close POST,
        // i.e. prior step == "found" or "closeRetry".
        // The body shape distinguishes a search response (has change_records) from a close response.
        Response != nil
          ? (Response.Body != nil && (Response.Body.change_records ?? nil) != nil
              ? len(Response.Body.change_records ?? []) == 0
              : ((Response.StatusCode >= 200 && Response.StatusCode < 300) ||
                 (Response.StatusCode >= 400 && Response.StatusCode != 429 && Response.StatusCode < 500)))
          : (ResponseOutput == nil ||
             ((ResponseOutput.step ?? "") != "found" &&
              (ResponseOutput.step ?? "") != "closeRetry"))
  mode:
    context: promotionstrategy
    trigger:
      requeueDuration: 30s
      when:
        variables:
          expression: |
            // Gating is via activeCommitStatuses for reportOn: active.
            // gatedSpecs: spec envs that carry the close key (global or per-env).
            // noOpenPRsOnGated: only fire after the promotion PR(s) have merged on every gated env.
            // Fingerprint: same construction as change-management-approval — built from Proposed.Note.DrySha.
            // Two-phase state: priorStep / priorChangeId / haveChangeId capture whether a prior search
            // already found a change record that still needs to be POST-closed.
            let key = "change-management-close";
            let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
            let statusList = PromotionStrategy.Status.Environments ?? [];
            let globalHasKey = any(PromotionStrategy.Spec.ActiveCommitStatuses ?? [], {#.Key == key});
            let gatedSpecs = filter(specEnvsList, {
              globalHasKey || any(#.ActiveCommitStatuses ?? [], {#.Key == key})
            });
            let noOpenPRsOnGated = len(gatedSpecs) > 0 && all(gatedSpecs, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
            });
            let allSpecBranchesHaveNoteDrySha = len(specEnvsList) > 0 && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != ""
            });
            let firstSpecBranch = len(specEnvsList) > 0 ? specEnvsList[0].Branch : "";
            let stCanonical = find(statusList, { #.Branch == firstSpecBranch });
            let canonicalNoteDrySha = stCanonical != nil && stCanonical.Proposed.Note != nil ? stCanonical.Proposed.Note.DrySha : "";
            let allNoteDryShasMatch = allSpecBranchesHaveNoteDrySha && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha == canonicalNoteDrySha
            });
            let fingerprint = join(map(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
            }), "|");
            let priorStep = ResponseOutput != nil ? (ResponseOutput.step ?? "") : "";
            let priorChangeId = ResponseOutput != nil ? (ResponseOutput.changeId ?? "") : "";
            let haveChangeId = priorChangeId != "" &&
              (priorStep == "found" || priorStep == "closeRetry");
            let alreadyDoneForFingerprint = fingerprint != "" &&
              fingerprint == (TriggerOutput.lastDoneFingerprint ?? "");
            let lastStatusCode = ResponseOutput != nil ? (ResponseOutput.statusCode ?? 0) : 0;
            let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
            let needsRetry = !isNewFingerprint && priorStep == "closeRetry";
            let inCloseMode = haveChangeId;
            {
              noOpenPRsOnGated: noOpenPRsOnGated,
              allNoteDryShasMatch: allNoteDryShasMatch,
              fingerprint: fingerprint,
              canonicalNoteDrySha: canonicalNoteDrySha,
              haveChangeId: haveChangeId,
              alreadyDoneForFingerprint: alreadyDoneForFingerprint,
              isNewFingerprint: isNewFingerprint,
              needsRetry: needsRetry,
              priorStep: priorStep,
              priorChangeId: priorChangeId,
              lastStatusCode: lastStatusCode,
              inCloseMode: inCloseMode
            }
        expression: |
          // Fire when:
          //  - all proposed note dry SHAs are aligned (hydrator done across envs),
          //  - we haven't already finished close for this fingerprint (closed OK or terminally failed),
          //  - any of: new fingerprint (start a fresh search), have a found changeId waiting to be POSTed,
          //            or we hit a retryable close error and need to retry,
          //  - no gated env still has an open promotion PR (promotion has merged → safe to close).
          Variables.allNoteDryShasMatch &&
          !Variables.alreadyDoneForFingerprint &&
          (Variables.isNewFingerprint || Variables.haveChangeId || Variables.needsRetry) &&
          Variables.noOpenPRsOnGated
        output:
          expression: |
            // lastDoneFingerprint advances when this fingerprint reaches a terminal state for close:
            // either a successful POST (step == "closed") or a non-retryable failure (step == "closeFailedTerminal").
            // lastClosedFingerprint tracks only successful closes — used by success.when carry-forward.
            // priorStep / priorChangeId come from ResponseOutput, which persists across reconciles and
            // is NOT reset when the fingerprint rolls forward. Gate "justClosed"/"justDone" on
            // priorMatchesCurrent so a stale "closed"/"closeFailedTerminal" from the previous fingerprint
            // cannot stamp the new fingerprint as done before its own close has actually run.
            let shouldTrigger = Variables.allNoteDryShasMatch &&
              !Variables.alreadyDoneForFingerprint &&
              (Variables.isNewFingerprint || Variables.haveChangeId || Variables.needsRetry) &&
              Variables.noOpenPRsOnGated;
            let priorMatchesCurrent = Variables.fingerprint != "" &&
              Variables.fingerprint == (TriggerOutput.lastFingerprint ?? "");
            let justClosed = priorMatchesCurrent && Variables.priorStep == "closed";
            let justDone = priorMatchesCurrent &&
              (Variables.priorStep == "closed" || Variables.priorStep == "closeFailedTerminal");
            // lastClosedChangeId captures the found change id at the moment the close POST fires
            // (Variables.priorChangeId holds the search-found id then). The response.output expression
            // does NOT have access to ResponseOutput, so the close response itself persists changeId=""
            // — this trigger-output field is the only place across reconciles where the closed change id
            // remains available for the description template.
            let inFlightClose = shouldTrigger && Variables.inCloseMode && Variables.haveChangeId;
            {
              lastFingerprint: shouldTrigger ? Variables.fingerprint : (TriggerOutput.lastFingerprint ?? ""),
              lastDoneFingerprint: justDone ? Variables.fingerprint : (TriggerOutput.lastDoneFingerprint ?? ""),
              lastClosedFingerprint: justClosed ? Variables.fingerprint : (TriggerOutput.lastClosedFingerprint ?? ""),
              lastClosedChangeId: inFlightClose ? Variables.priorChangeId : (TriggerOutput.lastClosedChangeId ?? ""),
              shouldTrigger: shouldTrigger,
              allNoteDryShasMatch: Variables.allNoteDryShasMatch,
              noOpenPRsOnGated: Variables.noOpenPRsOnGated,
              isNewFingerprint: Variables.isNewFingerprint,
              needsRetry: Variables.needsRetry,
              alreadyDoneForFingerprint: Variables.alreadyDoneForFingerprint,
              haveChangeId: Variables.haveChangeId,
              priorStep: Variables.priorStep,
              priorChangeId: Variables.priorChangeId,
              priorMatchesCurrent: priorMatchesCurrent,
              fingerprint: Variables.fingerprint,
              canonicalNoteDrySha: Variables.canonicalNoteDrySha,
              strategyBranches: map(PromotionStrategy.Spec.Environments, { #.Branch }),
              phase: Phase,
              evaluatedAt: string(now())
            }
      response:
        output:
          expression: |
            // Two-phase response handling — distinguish search GET from close POST by shape of body.
            // Search GET returns { change_records: [...] }; close POST does not.
            // On search, pick the first active (in-window) change record id; fall back to first record id.
            // On close POST: step depends on status code —
            //   2xx → "closed"           (terminal success)
            //   429 / 5xx → "closeRetry" (transient; trigger will re-fire)
            //   other 4xx → "closeFailedTerminal" (give up; treat as success per "never failure" policy)
            let isSearch = Response.Body != nil && (Response.Body.change_records ?? nil) != nil;
            let priorChangeId = ResponseOutput != nil ? (ResponseOutput.changeId ?? "") : "";
            let activeRecords = isSearch
              ? filter(Response.Body.change_records ?? [], {
                  date(#.change_request.start_time) <= now() && date(#.change_request.end_time) >= now()
                })
              : [];
            let searchedId = isSearch
              ? (len(activeRecords) > 0
                  ? string(activeRecords[0].id ?? "")
                  : (len(Response.Body.change_records ?? []) > 0
                      ? string((Response.Body.change_records ?? [])[0].id ?? "")
                      : ""))
              : priorChangeId;
            let sc = Response.StatusCode;
            let closeStep = sc >= 200 && sc < 300
              ? "closed"
              : (sc == 429 || sc >= 500 ? "closeRetry" : "closeFailedTerminal");
            let step = isSearch
              ? (searchedId != "" ? "found" : "searching")
              : closeStep;
            {
              statusCode: sc,
              step: step,
              changeId: searchedId,
              isSearch: isSearch,
              activeRecordCount: len(activeRecords),
              totalRecordCount: isSearch ? len(Response.Body.change_records ?? []) : 0,
              lastRequestedAt: string(now())
            }

---
apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: change-management-open
  namespace: default
spec:
  promotionStrategyRef:
    name: argocon-demo
  key: change-management-open
  reportOn: proposed
  descriptionTemplate: >-
    {{- /* presentation only — data fields are flattened by trigger.response.output.expression */ -}}
    {{- $cid := "" -}}{{- $sc := 0 -}}{{- $start := "" -}}{{- $end := "" -}}{{- $desc := "" -}}
    {{- if .ResponseOutput -}}
      {{- $cid   = index .ResponseOutput "changeId"           | default "" -}}
      {{- /* statusCode comes from JSON as float64; coerce to int for clean display + safe comparisons */ -}}
      {{- $sc    = index .ResponseOutput "statusCode"         | default 0 | int -}}
      {{- $start = index .ResponseOutput "crStartTime"        | default "" -}}
      {{- $end   = index .ResponseOutput "crEndTime"          | default "" -}}
      {{- $desc  = index .ResponseOutput "crShortDescription" | default "" -}}
    {{- end -}}
    {{- $sha := "" -}}
    {{- if .TriggerVariables -}}{{- $sha = index .TriggerVariables "canonicalNoteDrySha" | default "" -}}{{- end -}}
    {{- $shaShort := "" -}}{{- if ne $sha "" -}}{{- $shaShort = substr 0 7 $sha -}}{{- end -}}
    {{ .Phase }}:
    {{- if not .ResponseOutput }} preparing change record{{ if ne $shaShort "" }} for note dry SHA {{ $shaShort }}{{ end }}
    {{- else if and (eq $sc 202) (ne $cid "") }} created change {{ $cid }}
      {{- if ne $desc "" }} — "{{ $desc }}"{{- end -}}
      {{- if and (ne $start "") (ne $end "") }} · window {{ $start }} → {{ $end }}{{- end }}
    {{- else if eq $sc 202 }} change request accepted (HTTP 202) but no id returned — will retry
    {{- else }} change request returned HTTP {{ $sc }} (will retry)
    {{- end }}
  httpRequest:
    methodTemplate: POST
    timeout: 30s
    headerTemplates:
      Accept: application/json
      Content-Type: application/json
    urlTemplate: http://localhost:8987/v1/change-management-service/change/open
    bodyTemplate: |
      {
        "asset_id": "{{- index .NamespaceMetadata.Labels "argocd.intuit.com/asset-id" -}}",
        "on_behalf_of": "zaller",
        "short_description": "Automated prod promotion (multi-env)",
        "description": {{- $key := "change-management-open" -}}{{- $global := false -}}{{- range $.PromotionStrategy.Spec.ProposedCommitStatuses -}}{{- if eq .Key $key -}}{{- $global = true -}}{{- end -}}{{- end -}}{{- $out := printf "Production change-management record for GitOps promotion strategy `%s`.\n\n**What is changing:** the hydrator **proposed note dry SHA** on each branch below—that is the dry snapshot queued to move forward on that branch.\n\n**Where it is promoted (spec order):**\n" $.PromotionStrategy.Name -}}{{- range $se := $.PromotionStrategy.Spec.Environments -}}{{- $take := false -}}{{- if $global -}}{{- $take = true -}}{{- else -}}{{- range $se.ProposedCommitStatuses -}}{{- if eq .Key $key -}}{{- $take = true -}}{{- end -}}{{- end -}}{{- end -}}{{- if $take -}}{{- $sha := "" -}}{{- $pr := "" -}}{{- range $.PromotionStrategy.Status.Environments -}}{{- if eq .Branch $se.Branch -}}{{- if and .Proposed.Note .Proposed.Note.DrySha -}}{{- $sha = .Proposed.Note.DrySha -}}{{- end -}}{{- if .PullRequest -}}{{- if and (ne .PullRequest.Url "") (eq (printf "%s" .PullRequest.State) "open") -}}{{- $pr = .PullRequest.Url -}}{{- end -}}{{- end -}}{{- end -}}{{- end -}}{{- if ne $pr "" -}}{{- $disp := "—" -}}{{- if ne $sha "" -}}{{- $disp = $sha -}}{{- end -}}{{- $suffix := printf " — [PR](%s)" $pr -}}{{- $out = printf "%s\n- **%s** — proposed note dry SHA: `%s`%s" $out $se.Branch $disp $suffix -}}{{- end -}}{{- end -}}{{- end -}}{{- $out = printf "%s\n\n**Git repository ref:** `%s`" $out $.PromotionStrategy.Spec.RepositoryReference.Name -}}{{ $out | toJson }},
        "environment": "production",
        "backout_plan": "In the event that this new change introduces a regression in behavior or some other problem, a rollback to the previous version can be initiated through DevPortal or Argo CD.",
        "change_plan": "Automated GitOps promotion: proposed dry SHA advances through each environment via promoter pull requests, commit statuses, and merge gates before production.",
        "test_plan": "This change was initiated as part of a pipeline deployment and has been tested by all the automated tests that run as part of the pipeline.\n\nHowever, further testing by the team may be required after the successful deployment.\n\nAfter the deployment is completed, the team should perform the following validations:\n\n1. Verify the service is running as expected and all Golden Signals are healthy.\n2. Splunk logs and Wavefront dashboards do not show any unexpected errors or behavior.\n3. Run any functional tests (manual or automated) that are typically run after a deployment.\n4. Verify the new features and bug fixes included in this new version work as expected.",
        "category": "Application",
        "sub_category": "Release",
        "commit_id": "{{ index .TriggerVariables "canonicalNoteDrySha" }}",
        "start_time": "{{ now | date "2006-01-02T15:04:05Z07:00" }}",
        "end_time": "{{ now | dateModify "+30m" | date "2006-01-02T15:04:05Z07:00" }}",
        "risk": "low",
        "repo_url": "https://github.intuit.com/your-org/your-repo"
      }
  success:
    when:
      variables:
        expression: |
          let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
          let statusList = PromotionStrategy.Status.Environments ?? [];
          let fingerprint = join(map(specEnvsList, {
            let se = #;
            let st = find(statusList, { #.Branch == se.Branch });
            se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
          }), "|");
          { fingerprint: fingerprint }
      expression: |
        // success.when — whole expression (ternary on Response):
        //   HTTP path (Response set this reconcile): success iff POST returned 202, body present, and body.id present and non-empty (change was created).
        //   No-response path (Response nil this reconcile): success iff Phase is already "success" AND Variables.fingerprint == TriggerOutput.lastFingerprint (from when.variables).
        // Checks — HTTP path (all required when Response != nil):
        //   Response.StatusCode == 202
        //   Response.Body != nil
        //   Response.Body.id != nil && Response.Body.id != ""
        // Checks — no-response path (all required when Response == nil):
        //   Phase == "success"
        //   Variables.fingerprint == (TriggerOutput["lastFingerprint"] ?? "")
        Response != nil
          ? (Response.StatusCode == 202 &&
             Response.Body != nil &&
             Response.Body.id != nil &&
             Response.Body.id != "")
          : (Phase == "success" && Variables.fingerprint == (TriggerOutput["lastFingerprint"] ?? ""))
  mode:
    context: promotionstrategy
    trigger:
      requeueDuration: 30s
      when:
        variables:
          expression: |
            let key = "change-management-open";
            let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
            let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
            let firstGatedIdx = findIndex(specEnvsList, {
              globalHasKey || any(#.ProposedCommitStatuses ?? [], {#.Key == key})
            });
            let lowerSpecs = (firstGatedIdx != nil && firstGatedIdx > 0)
              ? take(specEnvsList, firstGatedIdx)
              : [];
            let statusList = PromotionStrategy.Status.Environments ?? [];
            let preGateNoOpenPR = all(lowerSpecs, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
            });
            let allSpecBranchesHaveNoteDrySha = len(specEnvsList) > 0 && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != ""
            });
            let firstSpecBranch = len(specEnvsList) > 0 ? specEnvsList[0].Branch : "";
            let stCanonical = find(statusList, { #.Branch == firstSpecBranch });
            let canonicalNoteDrySha = stCanonical != nil && stCanonical.Proposed.Note != nil ? stCanonical.Proposed.Note.DrySha : "";
            let allNoteDryShasMatch = allSpecBranchesHaveNoteDrySha && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha == canonicalNoteDrySha
            });
            let fingerprint = join(map(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
            }), "|");
            let hasOpenPR = any(specEnvsList, {
              let se = #;
              let envHasKey = globalHasKey || any(se.ProposedCommitStatuses ?? [], {#.Key == key});
              let st = find(statusList, { #.Branch == se.Branch });
              envHasKey && st != nil && st.PullRequest != nil && string(st.PullRequest.State) == "open"
            });
            let lastStatusCode = ResponseOutput != nil ? ResponseOutput.statusCode : 0;
            let isRetryable = lastStatusCode == 429 || lastStatusCode >= 500;
            let needsRetry = fingerprint == (TriggerOutput.lastFingerprint ?? "") &&
              Phase != "success" &&
              isRetryable;
            let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
            {
              hasOpenPR: hasOpenPR,
              allNoteDryShasMatch: allNoteDryShasMatch,
              isNewFingerprint: isNewFingerprint,
              needsRetry: needsRetry,
              preGateNoOpenPR: preGateNoOpenPR,
              fingerprint: fingerprint,
              canonicalNoteDrySha: canonicalNoteDrySha
            }
        expression: |
          // Fire POST when Variables gates pass (shared computation in when.variables).
          Variables.hasOpenPR && Variables.allNoteDryShasMatch && (Variables.isNewFingerprint || Variables.needsRetry) && Variables.preGateNoOpenPR
        output:
          expression: |
            let shouldTrigger = Variables.hasOpenPR && Variables.allNoteDryShasMatch && (Variables.isNewFingerprint || Variables.needsRetry) && Variables.preGateNoOpenPR;
            let lastStatusCode = ResponseOutput != nil ? ResponseOutput.statusCode : 0;
            {
              lastFingerprint: shouldTrigger ? Variables.fingerprint : (TriggerOutput.lastFingerprint ?? ""),
              shouldTrigger: shouldTrigger,
              hasOpenPR: Variables.hasOpenPR,
              allNoteDryShasMatch: Variables.allNoteDryShasMatch,
              isNewFingerprint: Variables.isNewFingerprint,
              needsRetry: Variables.needsRetry,
              preGateNoOpenPR: Variables.preGateNoOpenPR,
              fingerprint: Variables.fingerprint,
              canonicalNoteDrySha: Variables.canonicalNoteDrySha,
              strategyBranches: map(PromotionStrategy.Spec.Environments, { #.Branch }),
              lastStatusCode: lastStatusCode,
              phase: Phase,
              evaluatedAt: string(now())
            }
      response:
        output:
          expression: |
            let id = Response.Body.id;
            let msg = Response.Body.message;
            let cr = Response.Body.change_request;
            // crStartTime/crEndTime/crShortDescription are flattened here so descriptionTemplate
            // doesn't have to nil-defend the changeRequest sub-object on every field read.
            {
              statusCode: Response.StatusCode,
              changeId: id == nil ? "" : string(id),
              message: msg == nil ? "" : string(msg),
              changeRequest: cr ?? {},
              crStartTime: cr != nil && cr.start_time != nil ? string(cr.start_time) : "",
              crEndTime: cr != nil && cr.end_time != nil ? string(cr.end_time) : "",
              crShortDescription: cr != nil && cr.short_description != nil ? string(cr.short_description) : "",
              lastRequestedAt: string(now())
            }

---

apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: change-management-approval
  namespace: default
spec:
  promotionStrategyRef:
    name: argocon-demo
  key: change-management-approval
  reportOn: proposed
  descriptionTemplate: >-
    {{- /* presentation only — fields come from trigger.response.output.expression / when.variables / trigger.when.output */ -}}
    {{- $approved := 0 -}}{{- $total := 0 -}}{{- $sc := 0 -}}{{- $checked := "" -}}
    {{- if .ResponseOutput -}}
      {{- /* numeric fields come from JSON as float64; coerce to int for clean display + safe comparisons */ -}}
      {{- $approved = index .ResponseOutput "approvedCount"    | default 0 | int -}}
      {{- $total    = index .ResponseOutput "totalRecordCount" | default 0 | int -}}
      {{- $sc       = index .ResponseOutput "statusCode"       | default 0 | int -}}
      {{- $checked  = index .ResponseOutput "lastCheckedAt"    | default "" -}}
    {{- end -}}
    {{- $sha := "" -}}{{- $curFp := "" -}}
    {{- if .TriggerVariables -}}
      {{- $sha   = index .TriggerVariables "canonicalNoteDrySha" | default "" -}}
      {{- $curFp = index .TriggerVariables "fingerprint"         | default "" -}}
    {{- end -}}
    {{- $lastFp := "" -}}
    {{- if .TriggerOutput -}}{{- $lastFp = index .TriggerOutput "lastFingerprint" | default "" -}}{{- end -}}
    {{- $shaShort := "" -}}{{- if ne $sha "" -}}{{- $shaShort = substr 0 7 $sha -}}{{- end -}}
    {{- /* stale = a new fingerprint is in flight but the trigger hasn't fired the GET yet */ -}}
    {{- /* (TriggerOutput.lastFingerprint advances only on shouldTrigger), so any ResponseOutput */ -}}
    {{- /* present is from the prior fingerprint. */ -}}
    {{- $stale := and (ne $curFp "") (ne $curFp $lastFp) -}}
    {{ .Phase }}:
    {{- if or (not .ResponseOutput) $stale }} checking for approved change record{{ if ne $shaShort "" }} matching note dry SHA {{ $shaShort }}{{ end }}
    {{- else if and (eq $sc 200) (gt $approved 0) }} {{ $approved }} approved change record{{ if gt $approved 1 }}s{{ end }} in window ({{ $total }} total, last check {{ $checked }})
    {{- else if eq $sc 200 }} {{ $approved }}/{{ $total }} records active in approval window (last check {{ $checked }})
    {{- else }} approval check returned HTTP {{ $sc }}, will retry
    {{- end }}
  httpRequest:
    methodTemplate: GET
    timeout: 30s
    headerTemplates:
      Accept: application/json
    # canonicalNoteDrySha is computed in mode.trigger.when.variables (the trigger only fires
    # when allNoteDryShasMatch, so this is the agreed-upon SHA across all spec envs).
    urlTemplate: >-
      {{- $base := "http://localhost:8987/v1/change-management-service" -}}
      {{- $assetId := index .NamespaceMetadata.Labels "argocd.intuit.com/asset-id" -}}
      {{ $base }}/changes/search?asset_id={{ $assetId }}&commit_id={{ index .TriggerVariables "canonicalNoteDrySha" }}&limit=25
  success:
    when:
      variables:
        expression: |
          let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
          let statusList = PromotionStrategy.Status.Environments ?? [];
          let fingerprint = join(map(specEnvsList, {
            let se = #;
            let st = find(statusList, { #.Branch == se.Branch });
            se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
          }), "|");
          { fingerprint: fingerprint }
      expression: |
        // success.when — whole expression (ternary on Response):
        //   HTTP path (Response set this reconcile): success iff 200, non-empty change_records, and at least one record whose change_request start_time/end_time bracket now() (approved change active in the service window).
        //   No-response path (Response nil this reconcile): success iff Phase is already "success" AND Variables.fingerprint == TriggerOutput.lastFingerprint (from when.variables).
        //   Fingerprint (no-response branch): join of "branch:drySha" in spec order over every PromotionStrategy.spec.environments branch; empty drySha yields "branch:" segment.
        // Checks — HTTP path (all required when Response != nil):
        //   Response.StatusCode == 200
        //   len(Response.Body.change_records) > 0
        //   any(change_records, start_time <= now() && end_time >= now()
        //                       && status in ["APPROVED", "CONDITIONALLY_APPROVED", "CLOSED_SUCCESS"])
        // Checks — no-response path (all required when Response == nil):
        //   Phase == "success"
        //   Variables.fingerprint == (TriggerOutput["lastFingerprint"] ?? "")
        Response != nil
          ? (Response.StatusCode == 200 &&
             len(Response.Body.change_records) > 0 &&
             any(Response.Body.change_records, {
               date(#.change_request.start_time) <= now() &&
               date(#.change_request.end_time) >= now() &&
               ((#.status ?? "") == "APPROVED" || (#.status ?? "") == "CONDITIONALLY_APPROVED" || (#.status ?? "") == "CLOSED_SUCCESS")
             }))
          : (Phase == "success" && Variables.fingerprint == (TriggerOutput["lastFingerprint"] ?? ""))
  mode:
    context: promotionstrategy
    trigger:
      requeueDuration: 15s
      when:
        variables:
          expression: |
            let key = "change-management-approval";
            let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
            let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
            let firstGatedIdx = findIndex(specEnvsList, {
              globalHasKey || any(#.ProposedCommitStatuses ?? [], {#.Key == key})
            });
            let lowerSpecs = (firstGatedIdx != nil && firstGatedIdx > 0)
              ? take(specEnvsList, firstGatedIdx)
              : [];
            let statusList = PromotionStrategy.Status.Environments ?? [];
            let preGateNoOpenPR = all(lowerSpecs, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
            });
            let allSpecBranchesHaveNoteDrySha = len(specEnvsList) > 0 && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != ""
            });
            let firstSpecBranch = len(specEnvsList) > 0 ? specEnvsList[0].Branch : "";
            let stCanonical = find(statusList, { #.Branch == firstSpecBranch });
            let canonicalNoteDrySha = stCanonical != nil && stCanonical.Proposed.Note != nil ? stCanonical.Proposed.Note.DrySha : "";
            let allNoteDryShasMatch = allSpecBranchesHaveNoteDrySha && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha == canonicalNoteDrySha
            });
            let fingerprint = join(map(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
            }), "|");
            let hasOpenPR = any(specEnvsList, {
              let se = #;
              let envHasKey = globalHasKey || any(se.ProposedCommitStatuses ?? [], {#.Key == key});
              let st = find(statusList, { #.Branch == se.Branch });
              envHasKey && st != nil && st.PullRequest != nil && string(st.PullRequest.State) == "open"
            });
            let pollingIntervalMinutes = 1;
            let isFirstRun = TriggerOutput.lastRequestTime == nil;
            let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
            let shouldTriggerByTime = !isFirstRun && (
              (now() - date(TriggerOutput.lastRequestTime)) >= duration(string(pollingIntervalMinutes) + "m")
            );
            {
              hasOpenPR: hasOpenPR,
              allNoteDryShasMatch: allNoteDryShasMatch,
              preGateNoOpenPR: preGateNoOpenPR,
              fingerprint: fingerprint,
              canonicalNoteDrySha: canonicalNoteDrySha,
              isFirstRun: isFirstRun,
              isNewFingerprint: isNewFingerprint,
              shouldTriggerByTime: shouldTriggerByTime
            }
        expression: |
          // Fire GET when Variables gates pass (shared computation in when.variables).
          Variables.hasOpenPR && Variables.allNoteDryShasMatch && (Variables.isFirstRun || Variables.isNewFingerprint || Variables.shouldTriggerByTime) && Variables.preGateNoOpenPR
        output:
          expression: |
            let shouldTrigger = Variables.hasOpenPR && Variables.allNoteDryShasMatch && (Variables.isFirstRun || Variables.isNewFingerprint || Variables.shouldTriggerByTime) && Variables.preGateNoOpenPR;
            // lastFingerprint advances only when we actually fire the GET, so
            // when a new fingerprint comes in but trigger gates block (e.g.
            // preGateNoOpenPR=false), TriggerOutput.lastFingerprint stays on
            // the previously-checked fingerprint. The descriptionTemplate uses
            // (TriggerVariables.fingerprint != TriggerOutput.lastFingerprint)
            // to detect stale ResponseOutput.
            {
              lastFingerprint: shouldTrigger ? Variables.fingerprint : (TriggerOutput.lastFingerprint ?? ""),
              lastRequestTime: shouldTrigger ? now() : TriggerOutput.lastRequestTime,
              preGateNoOpenPR: Variables.preGateNoOpenPR,
              hasOpenPR: Variables.hasOpenPR,
              allNoteDryShasMatch: Variables.allNoteDryShasMatch,
              isNewFingerprint: Variables.isNewFingerprint,
              shouldTriggerByTime: Variables.shouldTriggerByTime,
              shouldTrigger: shouldTrigger,
              fingerprint: Variables.fingerprint,
              canonicalNoteDrySha: Variables.canonicalNoteDrySha,
              strategyBranches: map(PromotionStrategy.Spec.Environments, { #.Branch }),
              evaluatedAt: string(now())
            }
      response:
        output:
          expression: |
            let approvedRecords = filter(Response.Body.change_records ?? [], {
              date(#.change_request.start_time) <= now() &&
              date(#.change_request.end_time) >= now() &&
              ((#.status ?? "") == "APPROVED" || (#.status ?? "") == "CONDITIONALLY_APPROVED" || (#.status ?? "") == "CLOSED_SUCCESS")
            });
            {
              statusCode: Response.StatusCode,
              totalRecordCount: len(Response.Body.change_records ?? []),
              approvedRecords: approvedRecords,
              approvedCount: len(approvedRecords),
              lastCheckedAt: string(now())
            }

