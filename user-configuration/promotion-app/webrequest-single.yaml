apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: change-management-open
  namespace: default
spec:
  promotionStrategyRef:
    name: argocon-demo
  key: change-management-open
  reportOn: proposed
  descriptionTemplate: >-
    {{ .Phase }}: {{ if .ResponseOutput }}{{- $o := .ResponseOutput -}}{{- $cr := index $o "changeRequest" -}}{{ index $o "changeId" | default "—" }}
    (HTTP {{ index $o "statusCode" }}) · {{ if $cr }}{{ index $cr "start_time" | default "—" }}{{ else }}—{{ end }} → {{ if $cr }}{{ index $cr "end_time" | default "—" }}{{ else }}—{{ end }} · {{ if $cr }}{{ index $cr "short_description" | default "—" }}{{ else }}—{{ end }}{{ else }}open change request for note dry SHA{{ end }}
  httpRequest:
    method: POST
    timeout: 30s
    headerTemplates:
      Accept: application/json
      Content-Type: application/json
    urlTemplate: http://localhost:8987/v1/change-management-service/change
    bodyTemplate: |
      {
        "asset_id": "1372489579564901493",
        "on_behalf_of": "zaller",
        "short_description": "Automated prod promotion (multi-env)",
        "description": "Opens a change for the hydrator note dry SHA from the first gated environment that has proposed.note.drySha set.",
        "environment": "production",
        "backout_plan": "Rollback via standard GitOps revert / previous hydrated commit.",
        "change_plan": "Automated GitOps promotion: proposed dry SHA advances through each environment via promoter pull requests, commit statuses, and merge gates before production.",
        "test_plan": "Prior environments exercised the same hydrated manifests; Argo CD health and policy checks must succeed before this production promotion proceeds.",
        "category": "Application",
        "sub_category": "Release",
        "commit_id": "{{- $key := "change-management-open" -}}{{- $sha := "" -}}{{- range $st := .PromotionStrategy.Status.Environments -}}{{- if eq $sha "" -}}{{- $match := false -}}{{- range $se := $.PromotionStrategy.Spec.Environments -}}{{- if eq $se.Branch $st.Branch -}}{{- range $se.ProposedCommitStatuses -}}{{- if eq .Key $key -}}{{- $match = true -}}{{- end -}}{{- end -}}{{- end -}}{{- end -}}{{- if and $match $st.Proposed.Note (ne $st.Proposed.Note.DrySha "") -}}{{- $sha = $st.Proposed.Note.DrySha -}}{{- end -}}{{- end -}}{{- end -}}{{- $sha -}}",
        "start_time": "{{ now | date "2006-01-02T15:04:05Z07:00" }}",
        "end_time": "{{ now | dateModify "+30m" | date "2006-01-02T15:04:05Z07:00" }}",
        "risk": "low",
        "repo_url": "https://github.intuit.com/your-org/your-repo"
      }
  success:
    when:
      expression: |
        // success.when — whole expression (ternary on Response):
        //   HTTP path (Response set this reconcile): success iff POST returned 202, body present, and body.id present and non-empty (change was created).
        //   No-response path (Response nil this reconcile): success iff Phase is already "success" AND the gated branch:drySha fingerprint equals TriggerOutput.lastFingerprint (default ""), so requeues without a new HTTP do not clear success while the promotion shape still matches what the trigger last persisted.
        //   Fingerprint (no-response branch): join of "branch:drySha" over gatedStatuses — status rows whose spec branch lists this key (global or per-env); empty drySha yields "branch:" segment.
        // Conjuncts — HTTP path (all required when Response != nil):
        //   Response.StatusCode == 202
        //   Response.Body != nil
        //   Response.Body.id != nil && Response.Body.id != ""
        // Conjuncts — no-response path (all required when Response == nil):
        //   Phase == "success"
        //   fingerprint == (TriggerOutput["lastFingerprint"] ?? "") after computing fingerprint from gatedStatuses (lets below).
        Response != nil
          ? (Response.StatusCode == 202 &&
             Response.Body != nil &&
             Response.Body.id != nil &&
             Response.Body.id != "")
          : (Phase == "success" && (
              let key = "change-management-open";
              let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
              let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
              let gatedStatuses = filter(PromotionStrategy.Status.Environments ?? [], {
                let st = #;
                any(specEnvsList, {
                  let se = #;
                  se.Branch == st.Branch && (globalHasKey || any(se.ProposedCommitStatuses ?? [], {#.Key == key}))
                })
              });
              let fingerprint = join(map(gatedStatuses, { #.Branch + ":" + (#.Proposed.Note != nil && #.Proposed.Note.DrySha != "" ? #.Proposed.Note.DrySha : "") }), "|");
              fingerprint == (TriggerOutput["lastFingerprint"] ?? "")
            ))
  mode:
    context: promotionstrategy
    trigger:
      requeueDuration: 30s
      when:
        expression: |
          let key = "change-management-open";
          let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
          let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
          let firstGatedIdx = findIndex(specEnvsList, {
            globalHasKey || any(#.ProposedCommitStatuses ?? [], {#.Key == key})
          });
          let lowerSpecs = (firstGatedIdx != nil && firstGatedIdx > 0)
            ? take(specEnvsList, firstGatedIdx)
            : [];
          let statusList = PromotionStrategy.Status.Environments ?? [];
          let preGateNoOpenPR = all(lowerSpecs, {
            let se = #;
            let st = find(statusList, { #.Branch == se.Branch });
            st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
          });
          let gatedStatuses = filter(PromotionStrategy.Status.Environments ?? [], {
            let st = #;
            any(specEnvsList, {
              let se = #;
              se.Branch == st.Branch && any(se.ProposedCommitStatuses ?? [], {#.Key == key})
            })
          });
          let allGatedHaveNoteDrySha = len(gatedStatuses) > 0 && all(gatedStatuses, {
            #.Proposed.Note != nil && #.Proposed.Note.DrySha != ""
          });
          let canonicalNoteDrySha = len(gatedStatuses) > 0 && gatedStatuses[0].Proposed.Note != nil ? gatedStatuses[0].Proposed.Note.DrySha : "";
          let allNoteDryShasMatch = allGatedHaveNoteDrySha && all(gatedStatuses, {
            #.Proposed.Note.DrySha == canonicalNoteDrySha
          });
          let fingerprint = join(map(gatedStatuses, { #.Branch + ":" + (#.Proposed.Note != nil && #.Proposed.Note.DrySha != "" ? #.Proposed.Note.DrySha : "") }), "|");
          let hasOpenPR = any(gatedStatuses, { #.PullRequest != nil && string(#.PullRequest.State) == "open" });
          let lastStatusCode = ResponseOutput != nil ? ResponseOutput.statusCode : 0;
          let isRetryable = lastStatusCode == 429 || lastStatusCode >= 500;
          let needsRetry = fingerprint == (TriggerOutput.lastFingerprint ?? "") &&
            Phase != "success" &&
            isRetryable;
          let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
          // Whole expression: open the change only while a gated promotion PR is open, every gated env shares the same proposed.note.drySha, you need a new POST (fingerprint changed or retryable HTTP failure on the same fingerprint), and no spec-ordered branch before the first keyed env still has an open promotion PR on Status.
          // Conjuncts (all required):
          //   hasOpenPR — at least one gated env has an open promotion PR.
          //   allNoteDryShasMatch — every gated env has proposed.note.drySha set and all values match (one hydrator dry SHA).
          //   (isNewFingerprint || needsRetry) — fingerprint changed vs TriggerOutput.lastFingerprint, or same fingerprint with phase not success and last HTTP 429 or >=500 (retry throttling / server errors).
          //   preGateNoOpenPR — each spec-ordered env before the first keyed env has no open promotion PR on Status; true when lowerSpecs is empty.
          hasOpenPR && allNoteDryShasMatch && (isNewFingerprint || needsRetry) && preGateNoOpenPR
        output:
          expression: |
            let key = "change-management-open";
            let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
            let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
            let firstGatedIdx = findIndex(specEnvsList, {
              globalHasKey || any(#.ProposedCommitStatuses ?? [], {#.Key == key})
            });
            let lowerSpecs = (firstGatedIdx != nil && firstGatedIdx > 0)
              ? take(specEnvsList, firstGatedIdx)
              : [];
            let statusList = PromotionStrategy.Status.Environments ?? [];
            let preGateNoOpenPR = all(lowerSpecs, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
            });
            let gatedStatuses = filter(PromotionStrategy.Status.Environments ?? [], {
              let st = #;
              any(specEnvsList, {
                let se = #;
                se.Branch == st.Branch && any(se.ProposedCommitStatuses ?? [], {#.Key == key})
              })
            });
            let allGatedHaveNoteDrySha = len(gatedStatuses) > 0 && all(gatedStatuses, {
              #.Proposed.Note != nil && #.Proposed.Note.DrySha != ""
            });
            let canonicalNoteDrySha = len(gatedStatuses) > 0 && gatedStatuses[0].Proposed.Note != nil ? gatedStatuses[0].Proposed.Note.DrySha : "";
            let allNoteDryShasMatch = allGatedHaveNoteDrySha && all(gatedStatuses, {
              #.Proposed.Note.DrySha == canonicalNoteDrySha
            });
            let fingerprint = join(map(gatedStatuses, { #.Branch + ":" + (#.Proposed.Note != nil && #.Proposed.Note.DrySha != "" ? #.Proposed.Note.DrySha : "") }), "|");
            let hasOpenPR = any(gatedStatuses, { #.PullRequest != nil && string(#.PullRequest.State) == "open" });
            let lastStatusCode = ResponseOutput != nil ? ResponseOutput.statusCode : 0;
            let isRetryable = lastStatusCode == 429 || lastStatusCode >= 500;
            let needsRetry = fingerprint == (TriggerOutput.lastFingerprint ?? "") &&
              Phase != "success" &&
              isRetryable;
            let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
            // Whole expression (shouldTrigger): open the change only while a gated promotion PR is open, every gated env shares the same proposed.note.drySha, you need a new POST (fingerprint changed or retryable HTTP failure on the same fingerprint), and no spec-ordered branch before the first keyed env still has an open promotion PR on Status.
            // Conjuncts (all required):
            //   hasOpenPR — at least one gated env has an open promotion PR.
            //   allNoteDryShasMatch — every gated env has proposed.note.drySha set and all values match (one hydrator dry SHA).
            //   (isNewFingerprint || needsRetry) — fingerprint changed vs TriggerOutput.lastFingerprint, or same fingerprint with phase not success and last HTTP 429 or >=500 (retry throttling / server errors).
            //   preGateNoOpenPR — each spec-ordered env before the first keyed env has no open promotion PR on Status; true when lowerSpecs is empty.
            let shouldTrigger = hasOpenPR && allNoteDryShasMatch && (isNewFingerprint || needsRetry) && preGateNoOpenPR;
            {
              lastFingerprint: shouldTrigger ? fingerprint : (TriggerOutput.lastFingerprint ?? ""),
              shouldTrigger: shouldTrigger,
              hasOpenPR: hasOpenPR,
              allNoteDryShasMatch: allNoteDryShasMatch,
              isNewFingerprint: isNewFingerprint,
              needsRetry: needsRetry,
              preGateNoOpenPR: preGateNoOpenPR,
              fingerprint: fingerprint,
              canonicalNoteDrySha: canonicalNoteDrySha,
              gatedBranches: map(gatedStatuses, { #.Branch }),
              lastStatusCode: lastStatusCode,
              phase: Phase,
              evaluatedAt: string(now())
            }
      response:
        output:
          expression: |
            let id = Response.Body.id;
            let msg = Response.Body.message;
            {
              statusCode: Response.StatusCode,
              changeId: id == nil ? "" : (type(id) == "string" ? id : string(id)),
              message: msg == nil ? "" : (type(msg) == "string" ? msg : string(msg)),
              changeRequest: Response.Body.change_request ?? {},
              lastRequestedAt: string(now())
            }

---

apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: change-management-approval
  namespace: default
spec:
  promotionStrategyRef:
    name: argocon-demo
  key: change-management-approval
  reportOn: proposed
  descriptionTemplate: >-
    {{ .Phase }}: {{ if .ResponseOutput }}{{ .ResponseOutput.approvedCount | default 0 }}/{{
    .ResponseOutput.totalRecordCount | default 0 }} approved in window (last check: {{
    .ResponseOutput.lastCheckedAt | default "—" }}){{ else }}checking for approved change
    records in current time window{{ end }}
  httpRequest:
    method: GET
    timeout: 30s
    headerTemplates:
      Accept: application/json
    urlTemplate: >-
      http://localhost:8987/v1/change-management-service/changes/search?asset_id=1372489579564901493&commit_id={{-
      $key := "change-management-approval" -}}{{- $sha := "" -}}{{- range $st := .PromotionStrategy.Status.Environments -}}{{- if eq $sha "" -}}{{- $match := false -}}{{- range $se := $.PromotionStrategy.Spec.Environments -}}{{- if eq $se.Branch $st.Branch -}}{{- range $se.ProposedCommitStatuses -}}{{- if eq .Key $key -}}{{- $match = true -}}{{- end -}}{{- end -}}{{- end -}}{{- end -}}{{- if and $match $st.Proposed.Note (ne $st.Proposed.Note.DrySha "") -}}{{- $sha = $st.Proposed.Note.DrySha -}}{{- end -}}{{- end -}}{{- end -}}{{- $sha -}}&limit=25
  success:
    when:
      expression: |
        // success.when — whole expression (ternary on Response):
        //   HTTP path (Response set this reconcile): success iff 200, non-empty change_records, and at least one record whose change_request start_time/end_time bracket now() (approved change active in the service window).
        //   No-response path (Response nil this reconcile): success iff Phase is already "success" AND the gated branch:drySha fingerprint equals TriggerOutput.lastFingerprint (default ""), so requeues without a new HTTP do not clear success while the promotion shape still matches what the trigger last persisted.
        //   Fingerprint (no-response branch): join of "branch:drySha" over gatedStatuses — status rows whose spec branch references this key (global or per-env); empty drySha yields "branch:" segment.
        // Conjuncts — HTTP path (all required when Response != nil):
        //   Response.StatusCode == 200
        //   len(Response.Body.change_records) > 0
        //   any(change_records, start_time <= now() && end_time >= now())
        // Conjuncts — no-response path (all required when Response == nil):
        //   Phase == "success"
        //   fingerprint == (TriggerOutput["lastFingerprint"] ?? "") after computing fingerprint from gatedStatuses (lets below).
        Response != nil
          ? (Response.StatusCode == 200 &&
             len(Response.Body.change_records) > 0 &&
             any(Response.Body.change_records, {
               date(#.change_request.start_time) <= now() &&
               date(#.change_request.end_time) >= now()
             }))
          : (Phase == "success" && (
              let key = "change-management-approval";
              let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
              let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
              let gatedStatuses = filter(PromotionStrategy.Status.Environments ?? [], {
                let st = #;
                any(specEnvsList, {
                  let se = #;
                  se.Branch == st.Branch && (globalHasKey || any(se.ProposedCommitStatuses ?? [], {#.Key == key}))
                })
              });
              let fingerprint = join(map(gatedStatuses, { #.Branch + ":" + (#.Proposed.Note != nil && #.Proposed.Note.DrySha != "" ? #.Proposed.Note.DrySha : "") }), "|");
              fingerprint == (TriggerOutput["lastFingerprint"] ?? "")
            ))
  mode:
    context: promotionstrategy
    trigger:
      requeueDuration: 15s
      when:
        expression: |
          let key = "change-management-approval";
          let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
          let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
          let firstGatedIdx = findIndex(specEnvsList, {
            globalHasKey || any(#.ProposedCommitStatuses ?? [], {#.Key == key})
          });
          let lowerSpecs = (firstGatedIdx != nil && firstGatedIdx > 0)
            ? take(specEnvsList, firstGatedIdx)
            : [];
          let statusList = PromotionStrategy.Status.Environments ?? [];
          let preGateNoOpenPR = all(lowerSpecs, {
            let se = #;
            let st = find(statusList, { #.Branch == se.Branch });
            st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
          });
          let gatedStatuses = filter(PromotionStrategy.Status.Environments ?? [], {
            let st = #;
            any(specEnvsList, {
              let se = #;
              se.Branch == st.Branch && (globalHasKey || any(se.ProposedCommitStatuses ?? [], {#.Key == key}))
            })
          });
          let allGatedHaveNoteDrySha = len(gatedStatuses) > 0 && all(gatedStatuses, {
            #.Proposed.Note != nil && #.Proposed.Note.DrySha != ""
          });
          let canonicalNoteDrySha = len(gatedStatuses) > 0 && gatedStatuses[0].Proposed.Note != nil ? gatedStatuses[0].Proposed.Note.DrySha : "";
          let allNoteDryShasMatch = allGatedHaveNoteDrySha && all(gatedStatuses, {
            #.Proposed.Note.DrySha == canonicalNoteDrySha
          });
          let fingerprint = join(map(gatedStatuses, { #.Branch + ":" + (#.Proposed.Note != nil && #.Proposed.Note.DrySha != "" ? #.Proposed.Note.DrySha : "") }), "|");
          let hasOpenPR = any(gatedStatuses, { #.PullRequest != nil && string(#.PullRequest.State) == "open" });
          let pollingIntervalMinutes = 1;
          let isFirstRun = TriggerOutput.lastRequestTime == nil;
          let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
          let shouldTriggerByTime = !isFirstRun && (
            (now() - date(TriggerOutput.lastRequestTime)) >= duration(string(pollingIntervalMinutes) + "m")
          );
          // Whole expression: poll change-management only while a gated promotion PR is open, every gated env shares the same proposed.note.drySha, a poll is due (first GET, fingerprint changed, or polling interval since lastRequestTime), and no spec-ordered branch before the first keyed env still has an open promotion PR on Status.
          // Conjuncts (all required):
          //   hasOpenPR — at least one gated env has an open promotion PR.
          //   allNoteDryShasMatch — every gated env has proposed.note.drySha set and all values match (one hydrator dry SHA).
          //   (isFirstRun || isNewFingerprint || shouldTriggerByTime) — first poll (no lastRequestTime), or branch:drySha fingerprint changed vs TriggerOutput.lastFingerprint, or pollingIntervalMinutes elapsed since lastRequestTime (rate-limit vs controller requeue).
          //   preGateNoOpenPR — each spec-ordered env before the first keyed env has no open promotion PR on Status; true when lowerSpecs is empty.
          hasOpenPR && allNoteDryShasMatch && (isFirstRun || isNewFingerprint || shouldTriggerByTime) && preGateNoOpenPR
        output:
          expression: |
            let key = "change-management-approval";
            let specEnvsList = PromotionStrategy.Spec.Environments ?? [];
            let globalHasKey = any(PromotionStrategy.Spec.ProposedCommitStatuses ?? [], {#.Key == key});
            let firstGatedIdx = findIndex(specEnvsList, {
              globalHasKey || any(#.ProposedCommitStatuses ?? [], {#.Key == key})
            });
            let lowerSpecs = (firstGatedIdx != nil && firstGatedIdx > 0)
              ? take(specEnvsList, firstGatedIdx)
              : [];
            let statusList = PromotionStrategy.Status.Environments ?? [];
            let preGateNoOpenPR = all(lowerSpecs, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
            });
            let gatedStatuses = filter(PromotionStrategy.Status.Environments ?? [], {
              let st = #;
              any(specEnvsList, {
                let se = #;
                se.Branch == st.Branch && (globalHasKey || any(se.ProposedCommitStatuses ?? [], {#.Key == key}))
              })
            });
            let allGatedHaveNoteDrySha = len(gatedStatuses) > 0 && all(gatedStatuses, {
              #.Proposed.Note != nil && #.Proposed.Note.DrySha != ""
            });
            let canonicalNoteDrySha = len(gatedStatuses) > 0 && gatedStatuses[0].Proposed.Note != nil ? gatedStatuses[0].Proposed.Note.DrySha : "";
            let allNoteDryShasMatch = allGatedHaveNoteDrySha && all(gatedStatuses, {
              #.Proposed.Note.DrySha == canonicalNoteDrySha
            });
            let fingerprint = join(map(gatedStatuses, { #.Branch + ":" + (#.Proposed.Note != nil && #.Proposed.Note.DrySha != "" ? #.Proposed.Note.DrySha : "") }), "|");
            let hasOpenPR = any(gatedStatuses, { #.PullRequest != nil && string(#.PullRequest.State) == "open" });
            let pollingIntervalMinutes = 1;
            let isFirstRun = TriggerOutput.lastRequestTime == nil;
            let isNewFingerprint = fingerprint != (TriggerOutput.lastFingerprint ?? "");
            let shouldTriggerByTime = !isFirstRun && (
              (now() - date(TriggerOutput.lastRequestTime)) >= duration(string(pollingIntervalMinutes) + "m")
            );
            // Whole expression (shouldTrigger): poll change-management only while a gated promotion PR is open, every gated env shares the same proposed.note.drySha, a poll is due (first GET, fingerprint changed, or polling interval since lastRequestTime), and no spec-ordered branch before the first keyed env still has an open promotion PR on Status.
            // Conjuncts (all required):
            //   hasOpenPR — at least one gated env has an open promotion PR.
            //   allNoteDryShasMatch — every gated env has proposed.note.drySha set and all values match (one hydrator dry SHA).
            //   (isFirstRun || isNewFingerprint || shouldTriggerByTime) — first poll (no lastRequestTime), or branch:drySha fingerprint changed vs TriggerOutput.lastFingerprint, or pollingIntervalMinutes elapsed since lastRequestTime (rate-limit vs controller requeue).
            //   preGateNoOpenPR — each spec-ordered env before the first keyed env has no open promotion PR on Status; true when lowerSpecs is empty.
            let shouldTrigger = hasOpenPR && allNoteDryShasMatch && (isFirstRun || isNewFingerprint || shouldTriggerByTime) && preGateNoOpenPR;
            {
              lastFingerprint: fingerprint,
              lastRequestTime: shouldTrigger ? now() : TriggerOutput.lastRequestTime,
              preGateNoOpenPR: preGateNoOpenPR,
              hasOpenPR: hasOpenPR,
              allNoteDryShasMatch: allNoteDryShasMatch,
              isNewFingerprint: isNewFingerprint,
              shouldTriggerByTime: shouldTriggerByTime,
              shouldTrigger: shouldTrigger,
              fingerprint: fingerprint,
              canonicalNoteDrySha: canonicalNoteDrySha,
              gatedBranches: map(gatedStatuses, { #.Branch }),
              evaluatedAt: string(now())
            }
      response:
        output:
          expression: |
            let approvedRecords = filter(Response.Body.change_records ?? [], {
              date(#.change_request.start_time) <= now() && date(#.change_request.end_time) >= now()
            });
            {
              statusCode: Response.StatusCode,
              totalRecordCount: len(Response.Body.change_records ?? []),
              approvedRecords: approvedRecords,
              approvedCount: len(approvedRecords),
              lastCheckedAt: string(now())
            }
