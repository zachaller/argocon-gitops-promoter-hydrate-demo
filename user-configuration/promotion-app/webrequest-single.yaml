            let gatedSpecs = filter(specEnvsList, {
              globalHasKey || any(#.ActiveCommitStatuses ?? [], {#.Key == key})
            });
            let noOpenPRsOnGated = len(gatedSpecs) > 0 && all(gatedSpecs, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st == nil || st.PullRequest == nil || string(st.PullRequest.State) != "open"
            });
            let allSpecBranchesHaveNoteDrySha = len(specEnvsList) > 0 && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != ""
            });
            let firstSpecBranch = len(specEnvsList) > 0 ? specEnvsList[0].Branch : "";
            let allNoteDryShasMatch = allSpecBranchesHaveNoteDrySha && all(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
            let fingerprint = join(map(specEnvsList, {
              let se = #;
              let st = find(statusList, { #.Branch == se.Branch });
              se.Branch + ":" + (st != nil && st.Proposed.Note != nil && st.Proposed.Note.DrySha != "" ? st.Proposed.Note.DrySha : "")
            }), "|");
            let priorStep = ResponseOutput != nil ? (ResponseOutput.step ?? "") : "";
            let priorChangeId = ResponseOutput != nil ? (ResponseOutput.changeId ?? "") : "";
            let haveChangeId = priorChangeId != "" &&
              fingerprint == (TriggerOutput.lastDoneFingerprint ?? "");
              fingerprint: fingerprint,
              canonicalNoteDrySha: canonicalNoteDrySha,
              haveChangeId: haveChangeId,
              alreadyDoneForFingerprint: alreadyDoneForFingerprint,
              isNewFingerprint: isNewFingerprint,
              needsRetry: needsRetry,
              priorStep: priorStep,
              priorChangeId: priorChangeId,
            }
          //  - any of: new fingerprint (start a fresh search), have a found changeId waiting to be POSTed,
          //            or we hit a retryable close error and need to retry,
          //  - no gated env still has an open promotion PR (promotion has merged → safe to close).
          Variables.allNoteDryShasMatch &&
          expression: |
            // lastDoneFingerprint advances when this fingerprint reaches a terminal state for close:
            // either a successful POST (step == "closed") or a non-retryable failure (step == "closeFailedTerminal").
              (Variables.isNewFingerprint || Variables.haveChangeId || Variables.needsRetry) &&
              Variables.noOpenPRsOnGated;
              (Variables.priorStep == "closed" || Variables.priorStep == "closeFailedTerminal");
              lastClosedFingerprint: justClosed ? Variables.fingerprint : (TriggerOutput.lastClosedFingerprint ?? ""),
              lastClosedChangeId: inFlightClose ? Variables.priorChangeId : (TriggerOutput.lastClosedChangeId ?? ""),
              shouldTrigger: shouldTrigger,
              allNoteDryShasMatch: Variables.allNoteDryShasMatch,
              noOpenPRsOnGated: Variables.noOpenPRsOnGated,
              isNewFingerprint: Variables.isNewFingerprint,
              needsRetry: Variables.needsRetry,
              priorMatchesCurrent: priorMatchesCurrent,
              strategyBranches: map(PromotionStrategy.Spec.Environments, { #.Branch }),
              phase: Phase,
              evaluatedAt: string(now())
            }
      response:
        output:
            // Search GET returns { change_records: [...] }; close POST does not.
            // On search, pick the first active (in-window) change record id; fall back to first record id.
            // On close POST: step depends on status code —
            //   2xx → "closed"           (terminal success)
            //   429 / 5xx → "closeRetry" (transient; trigger will re-fire)
                      : ""))
              : priorChangeId;
            let sc = Response.StatusCode;
            let closeStep = sc >= 200 && sc < 300
              ? "closed"
              : (sc == 429 || sc >= 500 ? "closeRetry" : "closeFailedTerminal");
              : closeStep;
            {
              statusCode: sc,
              step: step,
              activeRecordCount: len(activeRecords),
              totalRecordCount: isSearch ? len(Response.Body.change_records ?? []) : 0,
              lastRequestedAt: string(now())
            }

