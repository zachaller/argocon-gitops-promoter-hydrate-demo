apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: github-pr-approval
  namespace: default
spec:
  promotionStrategyRef:
    name: argocon-demo

  key: github-pr-approval

  # User-friendly description shown on the commit status in GitHub.
  descriptionTemplate: |
    {{- if .ResponseOutput }}
    {{- if eq (.ResponseOutput.mergeable_state | default "") "clean" }}
    Ready to merge — required reviews and status checks passed
    {{- else if eq (.ResponseOutput.mergeable_state | default "") "blocked" }}
    Blocked — need required reviews and passing checks before merge
    {{- else }}
    Checking merge requirements… (state: {{ .ResponseOutput.mergeable_state | default "unknown" }})
    {{- end }}
    {{- else }}
    Checking merge requirements…
    {{- end }}

  # Link to the PR so users can see what's blocking.
  urlTemplate: "{{ .Environment.PullRequest.Url }}"

  reportOn: proposed

  httpRequest:
    urlTemplate: "https://api.github.com/repos/{{ index (splitList "/" (trimPrefix "https://github.com" .Environment.PullRequest.Url)) 1 }}/{{ index (splitList "/" (trimPrefix "https://github.com" .Environment.PullRequest.Url)) 2 }}/pulls/{{ .Environment.PullRequest.ID }}"
    method: GET
    headerTemplates:
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    timeout: 30s
    authentication:
      scmAuth: {}

  success:
    when:
      expression: |
        Response.StatusCode == 200 &&
        Response.Body.mergeable_state == "clean"

  mode:
    trigger:
      requeueDuration: 2m
      when:
        expression: |
          Environment.PullRequest != nil &&
          string(Environment.PullRequest.State) == "open"
      response:
        output:
          expression: |
            {
              mergeable_state: Response.Body.mergeable_state ?? "unknown",
              mergeable: Response.Body.mergeable
            }
