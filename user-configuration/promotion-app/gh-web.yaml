apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: github-pr-approval
  namespace: default
spec:
  descriptionTemplate: |
    {{- if .ResponseOutput }}
    {{- if eq (.ResponseOutput.mergeable_state | default "") "clean" }}
    Ready to merge — all required checks passed
    {{- else if eq (.ResponseOutput.mergeable_state | default "") "unstable" }}
    Required checks passed (some non-required checks are pending/failing)
    {{- else if eq (.ResponseOutput.mergeable_state | default "") "blocked" }}
    Blocked — required reviews or checks have not passed
    {{- else }}
    Checking merge requirements… (state: {{ .ResponseOutput.mergeable_state | default "unknown" }})
    {{- end }}
    {{- else }}
    Checking merge requirements…
    {{- end }}
  httpRequest:
    authentication:
      scmAuth: {}
    headerTemplates:
      Accept: application/vnd.github+json
      X-GitHub-Api-Version: "2022-11-28"
    method: GET
    timeout: 30s
    urlTemplate: https://api.github.com/repos/{{ index (splitList "/" (trimPrefix
      "https://github.com" .Environment.PullRequest.Url)) 1 }}/{{ index (splitList
      "/" (trimPrefix "https://github.com" .Environment.PullRequest.Url)) 2 }}/pulls/{{
      .Environment.PullRequest.ID }}
  key: github-pr-approval
  mode:
    trigger:
      requeueDuration: 2m
      response:
        output:
          expression: |
            {
              mergeable_state: Response.Body.mergeable_state ?? "unknown",
              mergeable: Response.Body.mergeable
            }
      when:
        expression: |
          Environment.PullRequest != nil &&
          string(Environment.PullRequest.State) == "open" &&
          all(
            PromotionStrategy.Status.Environments[:findIndex(PromotionStrategy.Status.Environments, #.Branch == Environment.Branch)],
            #.PullRequest == nil || #.PullRequest.State != "open"
          ) &&
          (TriggerOutput == nil ||
           TriggerOutput.lastCheckedSha != ReportedSha ||
           Phase != "success")
        output:
          expression: |
            {
              lastCheckedSha: ReportedSha
            }
  promotionStrategyRef:
    name: argocon-demo
  reportOn: proposed
  success:
    when:
      expression: |
        Response.StatusCode == 200 &&
        (Response.Body.mergeable_state == "clean" ||
         Response.Body.mergeable_state == "unstable")
  urlTemplate: '{{ .Environment.PullRequest.Url }}'
