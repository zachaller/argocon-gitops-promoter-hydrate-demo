apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: github-pr-approval
  namespace: default
  annotations:
    argocd.argoproj.io/tracking-id: "promotion-strategy:promoter.argoproj.io/WebRequestCommitStatus:default/github-pr-approval"
spec:
  promotionStrategyRef:
    name: argocon-demo
  key: github-pr-approval
  reportOn: proposed
  urlTemplate: >-
    {{- range .PromotionStrategy.Status.Environments }}{{- if eq .Branch $.Branch }}{{ .PullRequest.Url }}{{- end }}{{- end }}
  descriptionTemplate: >-
    {{- $reportedSha := "" }}{{- range .PromotionStrategy.Status.Environments
    }}{{- if eq .Branch $.Branch }}{{- $reportedSha = .Proposed.Hydrated.Sha
    }}{{- end }}{{- end -}} {{- if or (not .TriggerOutput) (ne (index
    .TriggerOutput "lastCheckedSha") $reportedSha) }} Checking merge
    requirements… {{- else if .ResponseOutput }} {{- if eq
    (.ResponseOutput.mergeable_state | default "") "clean" }} Ready to merge —
    all required checks passed {{- else if eq (.ResponseOutput.mergeable_state |
    default "") "unstable" }} Required checks passed (some non-required checks
    are pending/failing) {{- else if eq (.ResponseOutput.mergeable_state |
    default "") "blocked" }} Blocked — required reviews or checks have not
    passed {{- else }} Checking merge requirements… (state: {{
    .ResponseOutput.mergeable_state | default "unknown" }}) {{- end }} {{- else
    }} Checking merge requirements… {{- end }}
  httpRequest:
    method: GET
    timeout: 30s
    authentication:
      scm: {}
    headerTemplates:
      Accept: application/vnd.github+json
      X-GitHub-Api-Version: "2022-11-28"
    urlTemplate: >-
      {{- range .PromotionStrategy.Status.Environments }}{{- if eq .Branch
      $.Branch }}https://api.github.com/repos/{{ index (splitList "/"
      (trimPrefix "https://github.com" .PullRequest.Url)) 1 }}/{{ index
      (splitList "/" (trimPrefix "https://github.com" .PullRequest.Url)) 2
      }}/pulls/{{ .PullRequest.ID }}{{- end }}{{- end }}
  success:
    when:
      expression: |
        Response != nil &&
        Response.StatusCode == 200 &&
        (Response.Body.mergeable_state == "clean" ||
         Response.Body.mergeable_state == "unstable")
  mode:
    context: environments
    trigger:
      requeueDuration: 2m
      when:
        expression: |
          let envStatus = find(PromotionStrategy.Status.Environments, {.Branch == Branch});
          let reportedSha = envStatus.Proposed.Hydrated.Sha;
          let wrcsEnv = find(WebRequestCommitStatus.Status.Environments ?? [], {.Branch == Branch});
          let lastSuccessfulSha = wrcsEnv != nil ? (wrcsEnv.LastSuccessfulSha ?? "") : "";
          (TriggerOutput == nil || TriggerOutput.lastCheckedSha != reportedSha) ||
          (envStatus.PullRequest != nil &&
           string(envStatus.PullRequest.State) == "open" &&
           all(
             PromotionStrategy.Status.Environments[:findIndex(PromotionStrategy.Status.Environments, #.Branch == Branch)],
             #.PullRequest == nil || #.PullRequest.State != "open"
           ) &&
           (
             Phase != "success" ||
             (Phase == "success" &&
              lastSuccessfulSha != "" &&
              (TriggerOutput == nil || TriggerOutput.lastCheckedSha != lastSuccessfulSha))
           ))
        output:
          expression: |
            {
              lastCheckedSha: find(PromotionStrategy.Status.Environments, {.Branch == Branch}).Proposed.Hydrated.Sha
            }
      response:
        output:
          expression: |
            {
              mergeable_state: Response.Body.mergeable_state ?? "unknown",
              mergeable: Response.Body.mergeable,
              requestCount: (ResponseOutput != nil ? (ResponseOutput.requestCount ?? 0) : 0) + 1
            }
